        post:
            summary: We sent a SIP REFER (transfer initiated by the operator)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    kind:
                                        type: string
                                        description: 'Transfer kind: "blind" or "attended"'
                                    target:
                                        type: string
                                        description: SIP URI to which the leg is being transferred
                                    replaces_leg_id:
                                        type: string
                                        description: Leg whose dialog is replaced (attended transfer only)
    leg.transfer_requested:
        post:
            summary: We received a SIP REFER from the peer
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    kind:
                                        type: string
                                        description: 'Transfer kind: "blind" or "attended"'
                                    target:
                                        type: string
                                        description: SIP URI requested by the peer
                                    replaces_call_id:
                                        type: string
                                        description: Call-ID present in the Refer-To Replaces parameter (attended only)
                                    declined:
                                        type: boolean
                                        description: True when the REFER was declined (e.g. SIP_REFER_AUTO_DIAL=false)
