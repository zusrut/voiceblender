    sip.registration_attempt:
        post:
            summary: Inbound REGISTER surfaced for a challenge/accept/reject decision (auto-accepts on consult timeout)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    app_id:
                                        type: string
                                    attempt_id:
                                        type: string
                                    aor:
                                        type: string
                                    contact:
                                        type: string
                                    source_address:
                                        type: string
                                    transport:
                                        type: string
                                    user_agent:
                                        type: string
                                    call_id:
                                        type: string
                                    has_authorization:
                                        type: boolean
    sip.registration_active:
        post:
            summary: SIP AOR registration created or refreshed (one event per Contact)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    app_id:
                                        type: string
                                    aor:
                                        type: string
                                        description: Canonical Address of Record (e.g. sip:alice@vb.example)
                                    contact:
                                        type: string
                                        description: Contact URI registered by the UA
                                    socket:
                                        type: string
                                        description: Transport-layer socket (ip:port) the REGISTER arrived on
                                    transport:
                                        type: string
                                        description: 'Transport: udp | tcp | tls'
                                    user_agent:
                                        type: string
                                        description: User-Agent header from the REGISTER, if present
                                    call_id:
                                        type: string
                                        description: Call-ID of the most recent REGISTER
                                    granted_expires_seconds:
                                        type: integer
                                        description: Expiry granted to the binding (clamped to SIP_REGISTRATION_MAX_EXPIRES_SECONDS)
                                    expires_at:
                                        type: string
                                        description: Absolute expiry time (RFC 3339)
    sip.registration_expired:
        post:
            summary: SIP AOR registration removed (TTL, explicit unregister, force-delete, or single-binding replacement)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    app_id:
                                        type: string
                                    aor:
                                        type: string
                                        description: Canonical Address of Record
                                    contact:
                                        type: string
                                        description: Contact URI that was unbound
                                    socket:
                                        type: string
                                        description: Transport-layer socket that held the binding
                                    reason:
                                        type: string
                                        description: 'Why the binding was removed: ttl, unregistered, forced, or replaced'
    sip.outbound_registration_active:
        post:
