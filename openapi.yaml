    /rooms/{id}/agent/message:
        parameters:
            - $ref: '#/components/parameters/RoomId'
        post:
            operationId: agentRoomMessage
            summary: Inject a message into a running agent session on a room
            description: Sends a context message or instruction to the running agent. Supported by Deepgram (InjectAgentMessage), Pipecat (TextFrame), and VAPI (control URL). Returns 501 for ElevenLabs.
            tags:
                - Rooms
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AgentMessageRequest'
            responses:
                '200':
                    description: Message sent
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or missing message
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: No agent attached to this room
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Agent session not running
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '501':
