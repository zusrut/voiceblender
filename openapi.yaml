                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /sip/registrations:
        get:
            operationId: listSIPRegistrations
            summary: List active SIP AOR registrations
            description: Returns every currently bound AOR contact, with the UDP/TCP/TLS socket on which the binding's REGISTER arrived. Use this list to know which AORs are dialable via the `to` field of POST /v1/legs.
            tags:
                - SIP Registrations
            responses:
                '200':
                    description: List of bindings
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RegistrationsResponse'
    /sip/registrations/{aor}:
        parameters:
            - name: aor
              in: path
              required: true
              schema:
                type: string
        delete:
            operationId: deleteSIPRegistration
            summary: Force-unbind an AOR (or a single contact within it)
            description: The AOR must be URL-encoded in the path (for example, `sip:alice@vb.example` is encoded as `sip%3Aalice%40vb.example`). Without query parameters, every Contact under the AOR is removed; with `?contact=<contact-uri>` only that single Contact is removed.
            tags:
                - SIP Registrations
            responses:
                '204':
                    description: Binding(s) removed
                '400':
                    description: Invalid AOR encoding
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: AOR (or specified contact) not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /sip/registrations/attempts/{id}/challenge:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: challengeSIPRegistrationAttempt
            summary: Challenge a parked inbound REGISTER with a 401 digest auth request
            description: Targets an inbound REGISTER surfaced via the `sip.registration_attempt` event (by its `attempt_id`). Sends a SIP 401 with a `WWW-Authenticate` digest challenge; the UA's credentialed re-REGISTER is verified against the supplied credential and, on success, bound and answered with 200 OK. Provide either `password` or `ha1`. The attempt must still be parked (it auto-accepts after the consult timeout).
            tags:
                - SIP Registrations
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ChallengeRequest'
            responses:
                '202':
                    description: 401 challenge queued
                '400':
                    description: Missing realm/credential
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Registration attempt not found or already decided
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /sip/registrations/attempts/{id}/accept:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: acceptSIPRegistrationAttempt
            summary: Accept a parked inbound REGISTER attempt
            description: Binds the AOR and replies 200 OK for an inbound REGISTER surfaced via the `sip.registration_attempt` event (by its `attempt_id`). Equivalent to letting the consult timeout elapse, but immediate. An optional `max_expires` caps the granted binding TTL.
            tags:
                - SIP Registrations
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegistrationAcceptRequest'
            responses:
                '202':
                    description: Accept queued
                '400':
                    description: Invalid max_expires
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Registration attempt not found or already decided
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /sip/registrations/attempts/{id}/reject:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: rejectSIPRegistrationAttempt
            summary: Reject a parked inbound REGISTER attempt
            description: Replies with a non-2xx (403 Forbidden by default; override via `code`/`reason`) for an inbound REGISTER surfaced via the `sip.registration_attempt` event (by its `attempt_id`).
            tags:
                - SIP Registrations
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegistrationRejectRequest'
            responses:
                '202':
                    description: Reject queued
                '404':
                    description: Registration attempt not found or already decided
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /sip/trunks:
        post:
            operationId: createSIPTrunk
            summary: Create an outbound SIP trunk (REGISTER or static peering)
            description: 'Creates a typed SIP trunk. For `type: "sip_register"`, VoiceBlender begins REGISTERing to the supplied registrar URI with digest auth, refreshes before expiry, and routes inbound INVITEs that arrive on that peer''s socket plus outbound INVITEs whose `from` matches the AOR through the trunk. For `type: "ip_ip"`, returns 501 (reserved, not yet implemented).'
            tags:
                - SIP Trunks
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateTrunkRequest'
            responses:
                '202':
                    description: Trunk accepted; REGISTER runs asynchronously
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateTrunkResponse'
                '400':
                    description: Invalid JSON, missing required field, or unknown type
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '501':
                    description: Trunk type reserved but not yet implemented (e.g. ip_ip)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        get:
            operationId: listSIPTrunks
            summary: List configured SIP trunks
            tags:
                - SIP Trunks
            responses:
                '200':
                    description: List of trunks
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TrunksListResponse'
    /sip/trunks/{id}:
        parameters:
            - $ref: '#/components/parameters/LegId'
        get:
            operationId: getSIPTrunk
            summary: Get a single SIP trunk
            tags:
                - SIP Trunks
            responses:
                '200':
                    description: Trunk view
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TrunkView'
                '404':
                    description: Trunk not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: deleteSIPTrunk
            summary: Unregister and remove a SIP trunk
            description: 'Returns 202 Accepted; the unregister (REGISTER with Expires: 0) and final removal run asynchronously.'
            tags:
                - SIP Trunks
            responses:
                '202':
                    description: Trunk accepted for teardown
                '404':
                    description: Trunk not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /vsi:
        get:
            operationId: vsi
            summary: VoiceBlender Streaming Interface (VSI)
            description: Upgrades to a WebSocket connection and streams all events in real-time as JSON text frames. The JSON shape is identical to webhook payloads. The server sends a `{"type":"connected"}` message on connect, followed by events and periodic `{"type":"ping"}` keepalives. Clients may send `{"type":"pong"}` or `{"type":"stop"}` to close gracefully. Unknown message types receive an error response with the echoed `request_id` (reserved for future commands).
            tags:
                - Events
            responses:
                '101':
                    description: WebSocket upgrade successful. Server sends events as JSON text frames.
    /webrtc/offer:
        post:
            operationId: webrtcOffer
            summary: Establish a WebRTC leg via SDP offer/answer
            tags:
                - WebRTC
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/WebRTCOfferRequest'
            responses:
                '200':
                    description: SDP answer with leg ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebRTCOfferResult'
                '400':
                    description: Invalid JSON or invalid SDP offer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Peer connection, track creation, or answer generation failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /metrics:
        get:
            operationId: getMetrics
            summary: Prometheus metrics
            description: |
                Returns Prometheus-format metrics (text/plain exposition format). Includes VoiceBlender-specific metrics and standard Go runtime metrics.
            tags:
                - Observability
            responses:
                '200':
                    description: Prometheus text exposition format
                    content:
                        text/plain:
                            schema:
                                type: string
    /debug/pprof/:
        get:
            operationId: pprofIndex
            summary: pprof index
            description: |
                Index of available Go runtime profiles. Only available when built with `-tags pprof` (e.g. `go build -tags pprof ./...`).
            tags:
                - Observability
            responses:
                '200':
                    description: HTML index page listing available profiles
                    content:
                        text/html:
                            schema:
                                type: string
    /debug/pprof/profile:
        get:
            operationId: pprofCPU
            summary: CPU profile
            description: |
                30-second CPU profile (duration configurable via ?seconds= query param). Only available when built with `-tags pprof`.
            tags:
                - Observability
            parameters:
                - name: seconds
                  in: query
                  schema:
                    type: integer
                    default: 30
                  description: Profile duration in seconds
            responses:
                '200':
                    description: pprof binary profile
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
    /debug/pprof/heap:
        get:
            operationId: pprofHeap
            summary: Heap memory profile
            description: |
                Heap memory snapshot. Only available when built with `-tags pprof`.
            tags:
                - Observability
            responses:
                '200':
                    description: pprof binary profile
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
    /debug/pprof/goroutine:
        get:
            operationId: pprofGoroutine
            summary: Goroutine stack traces
            description: |
                All goroutine stack traces. Only available when built with `-tags pprof`.
            tags:
                - Observability
            responses:
                '200':
                    description: pprof binary profile
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
components:
    parameters:
        LegId:
            name: id
            in: path
            required: true
            schema:
                type: string
            description: Leg ID
        RoomId:
            name: id
            in: path
            required: true
            schema:
                type: string
            description: Room ID
        PlaybackId:
            name: playbackID
            in: path
            required: true
            schema:
                type: string
            description: Playback ID
    responses:
        LegNotFound:
            description: Leg not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
        RoomNotFound:
            description: Room not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
    schemas:
        Leg:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                id:
                    type: string
                    description: Unique leg identifier (UUID)
                type:
                    type: string
                    description: Leg type
                    enum:
                        - sip_inbound
                        - sip_outbound
                        - webrtc
                        - whatsapp_in
                        - whatsapp_out
                        - websocket_in
                        - websocket_out
                        - moq_in
                        - livekit_publish
                        - livekit_participant
                state:
                    type: string
                    description: Leg state
                    enum:
                        - ringing
                        - early_media
                        - connected
                        - held
                        - hung_up
                room_id:
                    type: string
                    description: Room ID if the leg is in a room, empty otherwise
                muted:
                    type: boolean
                    description: Whether the leg is muted (cannot be heard by others)
                deaf:
                    type: boolean
                    description: Whether the leg is deaf (cannot hear others)
                accept_dtmf:
                    type: boolean
                    description: Whether the leg receives DTMF digits broadcast from other legs in the same room. Defaults to true.
                held:
                    type: boolean
                    description: Whether the call is on hold (SIP legs only)
                role:
                    type: string
                    description: Routing role used by the room's audio routing matrix (e.g. "customer", "agent", "supervisor"). Empty string means unroled (full mesh).
                app_id:
                    type: string
                    description: Application identifier for event stream filtering.
                sip_headers:
                    type: object
                    additionalProperties:
                        type: string
                    description: 'Deprecated: X-* headers from the inbound INVITE. Only present on sip_inbound legs. Use `headers` for new code; it carries the same map plus surfaces handshake headers for websocket legs.'
                headers:
                    type: object
                    additionalProperties:
                        type: string
                    description: Custom protocol headers exposed by the leg's transport — X-/P- headers from a SIP INVITE, the WebSocket upgrade request, or supplied at outbound dial time.
            required:
                - id
                - type
                - state
                - muted
                - deaf
                - accept_dtmf
                - held
        Room:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                id:
                    type: string
                    description: Room identifier
                app_id:
                    type: string
                    description: Application identifier for event stream filtering.
                sample_rate:
                    type: integer
                    description: Mixer sample rate in Hz (8000, 16000, or 48000).
                participants:
                    type: array
                    items:
                        $ref: '#/components/schemas/Leg'
                    description: Legs currently in this room
            required:
                - id
                - sample_rate
                - participants
        Error:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                error:
                    type: string
                    description: Error message
            required:
                - error
        StatusResponse:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                status:
                    type: string
            required:
                - status
        AddLegRequest:
            type: object
            properties:
                leg_id:
                    type: string
                    description: ID of the leg to add
                mute:
                    type: boolean
                    description: If set, apply this mute state to the leg atomically before it joins the mixer (no race where un-muted audio enters the mix). Omit to leave current state untouched (useful when moving between rooms).
                deaf:
                    type: boolean
                    description: If set, apply this deaf state to the leg atomically before it joins the mixer. Omit to leave current state untouched.
                accept_dtmf:
                    type: boolean
                    description: If set, control whether this leg receives DTMF digits broadcast from other legs in the same room. Omit to leave current state untouched (default for new legs is true).
                role:
                    type: string
                    description: If set, apply this routing role to the leg atomically before it joins the mixer. The room's routing matrix (see PUT /v1/rooms/{id}/routing) decides which other legs this leg hears and is heard by based on roles. Pass "" to clear the role (full mesh). Omit to leave the current role untouched.
            required:
                - leg_id
        AgentMessageRequest:
            type: object
            properties:
                message:
                    type: string
                    description: Context or instruction to inject into the running agent session
            required:
                - message
        AnswerLegRequest:
            type: object
            properties:
                speech_detection:
                    type: boolean
                    description: If true, emit speaking.started and speaking.stopped events for this leg. If false, suppress them. Omit to use the server default (SPEECH_DETECTION_ENABLED env var, default false).
                codec:
                    type: string
                    description: Explicit codec for the answer SDP. Must appear in the remote offer's offered_codecs list. Omit to use the server's default preference order.
                    enum:
                        - PCMU
                        - PCMA
                        - G722
                        - opus
                        - AMR-WB
                        - AMR-NB
        ChallengeRequest:
            type: object
            properties:
                realm:
                    type: string
                username:
                    type: string
                password:
                    type: string
                ha1:
                    type: string
                algorithm:
                    type: string
                qop:
                    type: array
                    items:
                        type: string
                max_expires:
                    type: integer
            required:
                - realm
        CreateLegRequest:
            type: object
            properties:
                type:
                    type: string
                    description: Leg type
                    enum:
                        - sip
                        - whatsapp
                        - websocket
                        - livekit_room
                to:
                    type: string
                    description: Destination. For sip legs, a SIP URI (e.g. "sip:alice@example.com"). For whatsapp legs, an E.164 phone number (with or without '+').
                uri:
                    type: string
                    description: Deprecated alias for `to` (sip legs only). Prefer `to`.
                from:
                    type: string
                    description: Caller ID — sets the user part of the SIP From header (e.g. "+15551234567", "alice")
                privacy:
                    type: string
                    description: SIP Privacy header value (e.g. "id", "none")
                ring_timeout:
                    type: integer
                    description: Seconds to wait for answer; 0 = no timeout
                    default: 0
                max_duration:
                    type: integer
                    description: Maximum call duration in seconds after connect. Automatically hung up when reached. 0 or omitted = no limit.
                    default: 0
                codecs:
                    type: array
                    items:
                        type: string
                        enum:
                            - PCMU
                            - PCMA
                            - G722
                            - opus
                            - AMR-WB
                            - AMR-NB
                    description: Codec preference order (sip legs only)
                headers:
                    type: object
                    additionalProperties:
                        type: string
                    description: Custom headers to include in the outbound INVITE (sip/whatsapp) or the WebSocket upgrade request (websocket)
                room_id:
                    type: string
                    description: Room ID to auto-add the leg to once media is ready (early_media or connected). If the room does not exist, it is automatically created.
                auth:
                    description: Digest auth credentials. Required for whatsapp legs (Meta-issued password; username defaults to `from` with '+' stripped). Optional for sip legs (sipgo retries on 401/407 challenge).
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/SIPAuth'
                webhook_url:
                    type: string
                    description: Route all events for this leg exclusively to this URL instead of global webhooks.
                    format: uri
                webhook_secret:
                    type: string
                    description: HMAC-SHA256 signing secret for the per-leg webhook.
                amd:
                    description: Enable Answering Machine Detection on outbound calls. Include the object (even empty) to enable with defaults; omit to disable.
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/AMDParams'
                accept_dtmf:
                    type: boolean
                    description: If false, this leg will not receive DTMF digits broadcast from other legs in the same room. Defaults to true.
                    default: true
                app_id:
                    type: string
                    description: Application identifier. Carried through to all events for this leg. Use to filter the WebSocket event stream by app.
                speech_detection:
                    type: boolean
                    description: If true, emit speaking.started and speaking.stopped events for this leg. If false, suppress them. Omit to use the server default (SPEECH_DETECTION_ENABLED env var, default false).
                rtt:
                    type: boolean
                    description: 'For sip legs: offer Real-Time Text (ITU-T T.140 over RTP per RFC 4103) alongside audio. For websocket legs: enable the bidirectional text-message channel. Default: false.'
                    default: false
                url:
                    type: string
                    description: WebSocket target URL (ws:// or wss://) for outbound websocket legs. Required when type=websocket.
                    format: uri
                sample_rate:
                    type: integer
                    description: PCM sample rate for websocket legs. The room's mixer automatically resamples between this and the room rate.
                    enum:
                        - "8000"
                        - "16000"
                        - "24000"
                        - "48000"
                    default: 16000
                wire_format:
                    type: string
                    description: Audio framing for websocket legs. `binary` ships raw PCM as WebSocket binary frames; `json_base64` wraps PCM as `{"type":"audio","audio":"<base64>"}` text frames (browser-friendly).
                    enum:
                        - binary
                        - json_base64
                    default: binary
                sample_format:
                    type: string
                    description: On-the-wire PCM sample encoding for websocket legs. v1 only supports `s16le`.
                    enum:
                        - s16le
                    default: s16le
                livekit:
                    description: LiveKit room join parameters (only used when type=livekit_room).
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/LiveKitParams'
            required:
                - type
        CreateRoomBridgeRequest:
            type: object
            properties:
                id:
                    type: string
                    description: Custom bridge ID (auto-generated UUID if omitted)
                room_id:
                    type: string
                    description: The other room to join. Must use the same sample rate as the room in the path.
                direction:
                    type: string
                    description: 'Audio flow relative to the room in the path: bidirectional (both hear each other), send (path room → other only), receive (other → path room only), none (allocated but silent). Default: bidirectional.'
                    enum:
                        - bidirectional
                        - send
                        - receive
                        - none
                    default: bidirectional
            required:
                - room_id
        RoomCreateRequest:
            type: object
            properties:
                id:
                    type: string
                    description: Custom room ID (auto-generated UUID if omitted)
                webhook_url:
                    type: string
                    description: Route all events for this room exclusively to this URL instead of global webhooks.
                    format: uri
                webhook_secret:
                    type: string
                    description: HMAC-SHA256 signing secret for the per-room webhook.
                app_id:
                    type: string
                    description: Application identifier. Carried through to all events for this room. Use to filter the WebSocket event stream by app.
                sample_rate:
                    type: integer
                    description: 'Mixer sample rate in Hz. Allowed values: 8000, 16000, 48000. Default: 16000.'
                    enum:
                        - "8000"
                        - "16000"
                        - "48000"
                    default: 16000
            required:
                - id
        CreateTrunkRequest:
            type: object
            properties:
                type:
                    type: string
                    description: Trunk type discriminator. Only `sip_register` is implemented today; `ip_ip` is reserved and returns 501.
                    enum:
                        - sip_register
                        - ip_ip
                app_id:
                    type: string
                    description: Application identifier carried through to every event emitted by this trunk.
                sip_register:
                    description: Required when type == "sip_register". Configures the outbound REGISTER (registrar URI, AOR, digest credentials, expiry).
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/SIPRegisterTrunkSpec'
                ip_ip:
                    description: Reserved for static-IP peering (no REGISTER). Not yet implemented; supplying this returns 501.
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/IPIPTrunkSpec'
            required:
                - type
        DTMFRequest:
            type: object
            properties:
                digits:
                    type: string
                    description: 'DTMF digits to send (0-9, *, #)'
            required:
                - digits
        DeepgramAgentRequest:
            type: object
            properties:
                settings:
                    type: object
                    additionalProperties:
                        type: string
                    description: Full Deepgram agent settings object (agent.listen, agent.think, agent.speak, etc.). When omitted, sensible defaults are used (nova-3 STT, gpt-4o-mini LLM, aura-2-asteria-en TTS).
                greeting:
                    type: string
                    description: Agent greeting message
                language:
                    type: string
                    description: Language code (e.g. "en", "es")
                api_key:
                    type: string
                    description: API key override (falls back to DEEPGRAM_API_KEY env var)
        DeleteLegRequest:
            type: object
            properties:
                reason:
                    type: string
                    description: 'Disconnect reason. Only honored for unanswered SIP inbound legs (state `ringing` or `early_media`); on connected legs the body is ignored and the leg is hung up with the legacy `api_hangup` reason. The value flows through to `leg.disconnected`''s `cdr.reason` and selects the SIP final response: `busy`→486, `declined`/`rejected`→603, `unavailable`→480, `not_found`→404, `forbidden`→403, `server_error`→500.'
                    enum:
                        - busy
                        - declined
                        - rejected
                        - unavailable
                        - not_found
                        - forbidden
                        - server_error
        EarlyMediaLegRequest:
            type: object
            properties:
                codec:
                    type: string
                    description: Explicit codec for the 183 Session Progress SDP. Must appear in the remote offer's offered_codecs list. Omit to use the server's default preference order.
                    enum:
                        - PCMU
                        - PCMA
                        - G722
                        - opus
                        - AMR-WB
                        - AMR-NB
        ElevenLabsAgentRequest:
            type: object
            properties:
                agent_id:
                    type: string
                    description: ElevenLabs agent ID
                first_message:
                    type: string
                    description: Override the agent's first message
                language:
                    type: string
                    description: Language code (e.g. "en", "es")
                dynamic_variables:
                    type: object
                    additionalProperties:
                        type: string
                    description: Key-value pairs passed to the agent as dynamic variables
                api_key:
                    type: string
                    description: API key override (falls back to ELEVENLABS_API_KEY env var)
            required:
                - agent_id
        PipecatAgentRequest:
            type: object
            properties:
                websocket_url:
                    type: string
                    description: WebSocket URL of the Pipecat bot (e.g. ws://my-bot:8765)
                    format: uri
            required:
                - websocket_url
        PlaybackRequest:
            type: object
            properties:
                url:
                    type: string
                    description: URL of the audio file (mutually exclusive with tone)
                    format: uri
                tone:
                    type: string
                    description: 'Built-in telephone tone name. Format: {country}_{type} or bare {type} (defaults to US). Types: ringback, busy, dial, congestion. Countries: us, gb, de, fr, au, jp, it, in, br, pl, ru. Examples: us_ringback, gb_busy, dial.'
                mime_type:
                    type: string
                    description: MIME type (e.g. audio/wav). Required when using url.
                repeat:
                    type: integer
                    description: Number of times to repeat playback (url only)
                    default: 0
                volume:
                    type: integer
                    description: Volume adjustment in dB (-8 to 8)
                    default: 0
                    minimum: -8
                    maximum: 8
            required:
                - url
                - tone
                - mime_type
                - repeat
                - volume
            oneOf:
                - required:
                    - url
                    - mime_type
                - required:
                    - tone
        RTTRequest:
            type: object
            properties:
                text:
                    type: string
                    description: UTF-8 text to send. May be one or more characters and may include T.140 control codes (e.g. backspace U+0008, CR/LF).
            required:
                - text
        RecordingRequest:
            type: object
            properties:
                storage:
                    type: string
                    description: '"file" (default) — local disk, "s3" — upload to S3 after recording stops'
                    enum:
                        - file
                        - s3
                multi_channel:
                    type: boolean
                    description: When true, record each participant to a separate mono WAV file in addition to the full mix. Only applies to room recordings.
                    default: false
                s3_bucket:
                    type: string
                    description: S3 bucket name. Overrides S3_BUCKET env var. Required if env var is not set.
                s3_region:
                    type: string
                    description: AWS region. Overrides S3_REGION env var. Default us-east-1.
                s3_endpoint:
                    type: string
                    description: Custom S3 endpoint (MinIO, etc.). Overrides S3_ENDPOINT env var.
                s3_prefix:
                    type: string
                    description: Key prefix (e.g. recordings/). Overrides S3_PREFIX env var.
                s3_access_key:
                    type: string
                    description: AWS access key ID. Overrides default credential chain.
                s3_secret_key:
                    type: string
                    description: AWS secret access key. Must be set together with s3_access_key.
            required:
                - storage
                - multi_channel
                - s3_bucket
                - s3_region
                - s3_endpoint
                - s3_prefix
                - s3_access_key
                - s3_secret_key
        RegistrationAcceptRequest:
            type: object
            properties:
                max_expires:
                    type: integer
        RegistrationRejectRequest:
            type: object
            properties:
                code:
                    type: integer
                reason:
                    type: string
        RoomRoutingRequest:
            type: object
            properties:
                matrix:
                    type: object
                    additionalProperties:
                        type: array
                        items:
                            type: string
                    description: Listener-role → list of allowed source roles. Omitted listener roles default to full mesh. Empty list = hears nothing.
            required:
                - matrix
        RoomRoutingUpdateRequest:
            type: object
            properties:
                updates:
                    type: array
                    items:
                        $ref: '#/components/schemas/RoutingRowUpdate'
                    description: Per-listener-role row replacements applied as a single atomic update.
            required:
                - updates
        STTRequest:
            type: object
            properties:
                language:
                    type: string
                    description: Language code (e.g. "en", "es")
                partial:
                    type: boolean
                    description: Emit partial (non-final) transcripts
                    default: false
                provider:
                    type: string
                    description: 'STT provider: "elevenlabs" (default) or "deepgram"'
                    enum:
                        - elevenlabs
                        - deepgram
                api_key:
                    type: string
                    description: API key override (falls back to ELEVENLABS_API_KEY or DEEPGRAM_API_KEY env var depending on provider)
            required:
                - language
                - partial
        SetLegRoleRequest:
            type: object
            properties:
                role:
                    type: string
                    description: New routing role for the leg. The room's routing matrix decides which other legs this leg hears and is heard by based on roles. Pass an empty string to clear the role (full mesh).
            required:
                - role
        TTSRequest:
            type: object
            properties:
                text:
                    type: string
                    description: Text to synthesize
                voice:
                    type: string
                    description: 'Provider-specific voice identifier. ElevenLabs: voice name or ID. AWS Polly: voice ID (e.g. Joanna, Matthew). Google Cloud: voice name — either full format (e.g. en-US-Neural2-F) or short name for Gemini models (e.g. Achernar, Kore). Deepgram: model name (e.g. aura-2-asteria-en).'
                model_id:
                    type: string
                    description: 'Provider-specific model/engine. ElevenLabs: model ID. AWS Polly: engine (standard, neural, long-form, generative; default neural). Google Cloud: model name (e.g. gemini-2.5-pro-tts, chirp3-hd).'
                language:
                    type: string
                    description: Language code (e.g. "en-US", "pl-pl"). Required for Google Gemini TTS voices that use short names (e.g. Achernar). Auto-extracted from full voice names like en-US-Neural2-F.
                prompt:
                    type: string
                    description: Style/tone instruction for promptable voice models (Google Gemini TTS only). E.g. "Read aloud in a warm, welcoming tone."
                volume:
                    type: integer
                    description: Volume adjustment in dB (-8 to 8)
                    default: 0
                    minimum: -8
                    maximum: 8
                provider:
                    type: string
                    description: 'TTS provider: "elevenlabs" (default), "aws", "google", or "deepgram"'
                    enum:
                        - elevenlabs
                        - aws
                        - google
                        - deepgram
                api_key:
                    type: string
                    description: 'ElevenLabs: API key override (falls back to ELEVENLABS_API_KEY env var). AWS: optional ACCESS_KEY:SECRET_KEY override (falls back to default AWS credential chain). Google Cloud: optional API key override (falls back to Application Default Credentials). Deepgram: API key override (falls back to DEEPGRAM_API_KEY env var).'
            required:
                - text
                - voice
                - model_id
                - volume
        TransferCompleteRequest:
