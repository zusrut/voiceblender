    /rooms/{id}/bridges:
        parameters:
            - $ref: '#/components/parameters/RoomId'
        post:
            operationId: createRoomBridge
            summary: Bridge this room's mixer to another room's mixer
            description: 'Joins the room in the path with `room_id` so audio flows between their mixers. Both rooms must exist and share a sample rate. `direction` is relative to the room in the path: `bidirectional`, `send` (path room → other), `receive` (other → path room), or `none` (allocated but silent). Bridging rooms into a cycle with feedback-enabled directions causes audio feedback — use one-way directions to break loops.'
            tags:
                - Bridges
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateRoomBridgeRequest'
            responses:
                '201':
                    description: Bridge created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BridgeView'
                '400':
                    description: Invalid JSON, self-bridge, sample-rate mismatch, or invalid direction
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Path room or room_id not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: A bridge between these rooms already exists
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        get:
            operationId: listRoomBridges
            summary: List bridges involving this room
            tags:
                - Bridges
            responses:
                '200':
                    description: Array of bridges (direction relative to the path room)
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/BridgeView'
                '404':
                    description: Room not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /rooms/{id}/bridges/{bridgeID}:
        parameters:
            - $ref: '#/components/parameters/RoomId'
            - name: bridgeID
              in: path
              required: true
              schema:
                type: string
        get:
            operationId: getRoomBridge
            summary: Get a bridge involving this room
            tags:
                - Bridges
            responses:
                '200':
                    description: Bridge details (direction relative to the path room)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BridgeView'
                '404':
                    description: Bridge not found for this room
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        patch:
            operationId: updateRoomBridge
            summary: Change a bridge's audio flow direction
            description: Live-updates the direction (relative to the room in the path) without interrupting audio.
            tags:
                - Bridges
            requestBody:
                required: true
                content:
