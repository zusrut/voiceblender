openapi: 3.1.0
info:
    title: VoiceBlender API
    description: |
        VoiceBlender bridges SIP and WebRTC voice calls with multi-party audio mixing, real-time speech-to-text, text-to-speech, AI agent integration, recording, and webhook-based event delivery.
    x-config-vars:
        - name: INSTANCE_ID
          default: (auto-generated UUID)
          description: Instance identifier included in all API responses and webhook events
        - name: HTTP_ADDR
          default: :8080
          description: REST API listen address
        - name: SIP_BIND_IP
          default: 127.0.0.1
          description: IP used in SDP, Contact, and Via headers
        - name: SIP_LISTEN_IP
          default: (same as SIP_BIND_IP)
          description: UDP socket bind IP
        - name: SIP_PORT
          default: "5060"
          description: SIP listen port
        - name: SIP_HOST
          default: voiceblender
          description: SIP User-Agent name
        - name: ICE_SERVERS
          default: stun:stun.l.google.com:19302
          description: STUN/TURN URLs for WebRTC ICE, comma-separated
        - name: RECORDING_DIR
          default: /tmp/recordings
          description: Local directory for recording output files
        - name: LOG_LEVEL
          default: info
          description: 'Log verbosity: debug, info, warn, error'
        - name: WEBHOOK_URL
          default: ""
          description: Global webhook URL for event delivery (fallback when no per-leg or per-room webhook is set)
        - name: WEBHOOK_SECRET
          default: ""
          description: HMAC-SHA256 signing secret for the global webhook
        - name: ELEVENLABS_API_KEY
          default: ""
          description: API key for ElevenLabs TTS, STT, and Agent provider
        - name: VAPI_API_KEY
          default: ""
          description: API key for VAPI Agent provider
        - name: S3_BUCKET
          default: ""
          description: S3 bucket name for recording uploads
        - name: S3_REGION
          default: us-east-1
          description: AWS region for S3
        - name: S3_ENDPOINT
          default: ""
          description: Custom S3-compatible endpoint (e.g. MinIO)
        - name: S3_PREFIX
          default: ""
          description: Key prefix applied to all S3 objects
        - name: TTS_CACHE_ENABLED
          default: "false"
          description: Enable disk-backed TTS audio cache; cached audio persists across restarts
        - name: TTS_CACHE_DIR
          default: /tmp/tts_cache
          description: Directory for cached TTS audio files (used when TTS_CACHE_ENABLED=true)
        - name: TTS_CACHE_INCLUDE_API_KEY
          default: "false"
          description: Include API key in TTS cache key; set true if different keys map to different voice clones
        - name: SIP_JITTER_BUFFER_MS
          default: "0"
          description: SIP ingress jitter buffer target delay in ms (0 = disabled passthrough). Applies to every SIP leg.
        - name: SIP_JITTER_BUFFER_MAX_MS
          default: "300"
          description: Maximum depth of the SIP ingress jitter buffer in ms. Frames beyond this are dropped oldest-first to catch up after a stall.
        - name: SIP_REFER_AUTO_DIAL
          default: "false"
          description: 'When true, accept incoming SIP REFER requests and automatically originate the transferred call. Default-deny: stays off unless the SIP edge is locked down (IP allow-lists, digest auth) because auto-dialing arbitrary Refer-To URIs is a classic toll-fraud vector. Outbound transfers initiated via the REST API are unaffected by this flag.'
    version: 1.0.0
    license:
        name: MIT
servers:
    - url: http://localhost:8080/v1
      description: Local development server
tags:
    - name: Legs
      description: Voice call legs (SIP or WebRTC)
    - name: Rooms
      description: Multi-party audio conference rooms
    - name: WebRTC
      description: WebRTC peer connection establishment
    - name: Observability
      description: Metrics and health endpoints
paths:
    /legs:
        post:
            operationId: createLeg
            summary: Originate an outbound SIP call
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateLegRequest'
            responses:
                '201':
                    description: Leg created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Leg'
                '400':
                    description: Invalid JSON, bad SIP URI, unknown codec, or unsupported type
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        get:
            operationId: listLegs
            summary: List all active legs
            tags:
                - Legs
            responses:
                '200':
                    description: Array of legs
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Leg'
    /legs/{id}:
        parameters:
            - $ref: '#/components/parameters/LegId'
        get:
            operationId: getLeg
            summary: Get a single leg
            tags:
                - Legs
            responses:
                '200':
                    description: Leg details
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Leg'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: deleteLeg
            summary: Hang up a leg
            tags:
                - Legs
            responses:
                '200':
                    description: Leg hung up
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/answer:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: answerLeg
            summary: Answer a ringing or early-media inbound SIP leg
            tags:
                - Legs
            responses:
                '200':
                    description: Answer initiated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Not a SIP inbound leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in ringing or early_media state
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/early-media:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: earlyMediaLeg
            summary: Enable early media on a ringing inbound SIP leg
            description: Sends SIP 183 Session Progress with SDP and sets up the media pipeline. The leg transitions to `early_media` state, allowing audio playback and room participation before the call is answered.
            tags:
                - Legs
            responses:
                '200':
                    description: Early media enabled
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Not a SIP inbound leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in ringing state
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Media setup failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/mute:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: muteLeg
            summary: Mute a leg
            description: A muted leg's audio is excluded from the room mix and speaking events are suppressed. Taps (recording/STT) still receive the muted leg's own audio.
            tags:
                - Legs
            responses:
                '200':
                    description: Leg muted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: unmuteLeg
            summary: Unmute a leg
            tags:
                - Legs
            responses:
                '200':
                    description: Leg unmuted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/hold:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: holdLeg
            summary: Put a SIP call on hold
            description: Sends a re-INVITE with `sendonly` SDP direction. The RTP timeout is paused while held, and a 2-hour auto-hangup timer starts.
            tags:
                - Legs
            responses:
                '200':
                    description: Call held
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Not a SIP leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in connected state, or already held
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: unholdLeg
            summary: Resume a held SIP call
            description: Sends a re-INVITE with `sendrecv` SDP direction.
            tags:
                - Legs
            responses:
                '200':
                    description: Call resumed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Not a SIP leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not held
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/transfer:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: transferLeg
            summary: Transfer a SIP leg via REFER (asynchronous)
            description: Asynchronously transfers a SIP leg. The HTTP call returns 202 as soon as the request is validated; the REFER is sent in the background and its outcome is surfaced through `leg.transfer_initiated` / `leg.transfer_progress` / `leg.transfer_completed` / `leg.transfer_failed` events. Blind transfer when `replaces_leg_id` is omitted; attended transfer when present (the named leg's dialog identity is embedded as a Replaces parameter per RFC 3891). On terminal 2xx the leg (and the replaces leg, if any) is hung up automatically.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TransferRequest'
            responses:
                '202':
                    description: Transfer request accepted for processing
                '400':
                    description: Missing or invalid target URI (including URIs without a host such as sip:)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg not connected, not a SIP leg, or replaces_leg_id is invalid
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/dtmf:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: sendDTMF
            summary: Send DTMF digits on a leg
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DTMFRequest'
            responses:
                '200':
                    description: Digits sent
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or empty digits
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: DTMF writer unavailable
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/dtmf/accept:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: acceptDTMFLeg
            summary: Enable DTMF reception on a leg
            description: Allow this leg to receive DTMF digits broadcast from other legs in the same room. This is the default state for new legs.
            tags:
                - Legs
            responses:
                '200':
                    description: DTMF reception enabled
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/dtmf/reject:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: rejectDTMFLeg
            summary: Disable DTMF reception on a leg
            description: Block this leg from receiving DTMF digits broadcast from other legs in the same room. DTMF received from this leg's own far end is still emitted as a leg.dtmf event.
            tags:
                - Legs
            responses:
                '200':
                    description: DTMF reception disabled
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/play:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: playLeg
            summary: Start audio playback to a leg
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/PlaybackRequest'
            responses:
                '200':
                    description: Playback started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or volume out of range
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg has no audio writer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/play/{playbackID}:
        parameters:
            - $ref: '#/components/parameters/LegId'
            - $ref: '#/components/parameters/PlaybackId'
        patch:
            operationId: volumePlayLeg
            summary: Change the volume of an active leg playback
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/VolumeRequest'
            responses:
                '200':
                    description: Volume updated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or volume out of range
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Playback not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: stopPlayLeg
            summary: Stop audio playback on a leg
            tags:
                - Legs
            responses:
                '200':
                    description: Playback stopped
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: No playback in progress
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/tts:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: ttsLeg
            summary: Synthesize speech and play it on a leg
            description: Synthesizes the provided text using the configured TTS provider and plays the audio on the leg. When `TTS_CACHE_ENABLED=true`, identical requests (same text, voice, model, language, and prompt) are stored on disk in `TTS_CACHE_DIR` and persist across restarts, without calling the external provider.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TTSRequest'
            responses:
                '200':
                    description: TTS playback started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON, missing text/voice, or volume out of range
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg has no audio writer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '503':
                    description: No API key provided for the selected provider
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/record:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: recordLeg
            summary: Start recording a leg to a WAV file
            description: For SIP legs, recording is stereo (left=incoming, right=outgoing). For legs in a room, stereo at 16kHz (left=participant audio, right=mixed-minus-self).
            tags:
                - Legs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RecordingRequest'
            responses:
                '200':
                    description: Recording started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid storage type, S3 not configured, or invalid S3 credentials
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg has no audio reader or room not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Failed to create recording file
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: stopRecordLeg
            summary: Stop recording a leg
            tags:
                - Legs
            responses:
                '200':
                    description: Recording stopped
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: No recording in progress
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/record/pause:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: pauseRecordLeg
            summary: Pause a leg recording
            description: 'Replaces incoming audio with silence on the active recording until `/record/resume` is called. The WAV''s timeline is preserved (silent gap where audio was paused), so reviewers can see exactly when sensitive data was excluded. Idempotent: calling while already paused returns `status: already_paused`.'
            tags:
                - Legs
            responses:
                '200':
                    description: Recording paused (or already paused)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: No recording in progress
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/record/resume:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: resumeRecordLeg
            summary: Resume a paused leg recording
            description: 'Resumes writing real audio after a prior `/record/pause`. Idempotent: calling while not paused returns `status: not_paused`.'
            tags:
                - Legs
            responses:
                '200':
                    description: Recording resumed (or was not paused)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: No recording in progress
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/stt:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: sttLeg
            summary: Start real-time speech-to-text on a leg
            tags:
                - Legs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/STTRequest'
            responses:
                '200':
                    description: STT started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg not connected, STT already running, or no audio reader
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '503':
                    description: No ElevenLabs API key provided
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: stopSTTLeg
            summary: Stop speech-to-text on a leg
            tags:
                - Legs
            responses:
                '200':
                    description: STT stopped
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: No STT in progress
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/agent/elevenlabs:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: agentLegElevenLabs
            summary: Attach an ElevenLabs ConvAI agent to a leg
            description: Bridges audio bidirectionally with an ElevenLabs conversational AI agent. Standalone legs use direct audio; legs in a room use mixer taps.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ElevenLabsAgentRequest'
            responses:
                '200':
                    description: Agent started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or missing agent_id
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg not connected, agent already attached, or no audio reader/writer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '503':
                    description: No ElevenLabs API key provided
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/agent/vapi:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: agentLegVAPI
            summary: Attach a VAPI agent to a leg
            description: Bridges audio bidirectionally with a VAPI conversational AI agent. Standalone legs use direct audio; legs in a room use mixer taps.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/VAPIAgentRequest'
            responses:
                '200':
                    description: Agent started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or missing assistant_id
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg not connected, agent already attached, or no audio reader/writer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '503':
                    description: No VAPI API key provided
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/agent/pipecat:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: agentLegPipecat
            summary: Attach a Pipecat bot to a leg
            description: Bridges audio bidirectionally with a self-hosted Pipecat bot via WebSocket. Standalone legs use direct audio; legs in a room use mixer taps.
            tags:
                - Legs
            requestBody:
