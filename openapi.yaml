            operationId: vsi
            summary: VoiceBlender Streaming Interface (VSI)
            description: Upgrades to a WebSocket connection and streams all events in real-time as JSON text frames. The JSON shape is identical to webhook payloads. The server sends a `{"type":"connected"}` message on connect, followed by events and periodic `{"type":"ping"}` keepalives. Clients may send `{"type":"pong"}` or `{"type":"stop"}` to close gracefully. Unknown message types receive an error response with the echoed `request_id` (reserved for future commands).
            tags:
                - Events
            responses:
                '101':
                    description: WebSocket upgrade successful. Server sends events as JSON text frames.
    /webrtc/offer:
        post:
            operationId: webrtcOffer
            summary: Establish a WebRTC leg via SDP offer/answer
            tags:
                - WebRTC
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/WebRTCOfferRequest'
            responses:
                '200':
                    description: SDP answer with leg ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '400':
                    description: Invalid JSON or invalid SDP offer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Peer connection, track creation, or answer generation failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /metrics:
        get:
            operationId: getMetrics
            summary: Prometheus metrics
            description: |
                Returns Prometheus-format metrics (text/plain exposition format). Includes VoiceBlender-specific metrics and standard Go runtime metrics.
            tags:
                - Observability
            responses:
                '200':
                    description: Prometheus text exposition format
                    content:
                        text/plain:
                            schema:
                                type: string
    /debug/pprof/:
        get:
            operationId: pprofIndex
            summary: pprof index
            description: |
                Index of available Go runtime profiles. Only available when built with `-tags pprof` (e.g. `go build -tags pprof ./...`).
            tags:
                - Observability
            responses:
                '200':
                    description: HTML index page listing available profiles
                    content:
                        text/html:
                            schema:
                                type: string
    /debug/pprof/profile:
        get:
            operationId: pprofCPU
            summary: CPU profile
            description: |
                30-second CPU profile (duration configurable via ?seconds= query param). Only available when built with `-tags pprof`.
            tags:
                - Observability
            parameters:
                - name: seconds
                  in: query
                  schema:
                    type: integer
                    default: 30
                  description: Profile duration in seconds
            responses:
                '200':
                    description: pprof binary profile
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
    /debug/pprof/heap:
        get:
            operationId: pprofHeap
            summary: Heap memory profile
            description: |
                Heap memory snapshot. Only available when built with `-tags pprof`.
            tags:
                - Observability
            responses:
                '200':
                    description: pprof binary profile
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
    /debug/pprof/goroutine:
        get:
            operationId: pprofGoroutine
            summary: Goroutine stack traces
            description: |
                All goroutine stack traces. Only available when built with `-tags pprof`.
            tags:
                - Observability
            responses:
                '200':
                    description: pprof binary profile
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
components:
    parameters:
        LegId:
            name: id
            in: path
            required: true
            schema:
                type: string
            description: Leg ID
        RoomId:
            name: id
            in: path
            required: true
            schema:
                type: string
            description: Room ID
        PlaybackId:
            name: playbackID
            in: path
            required: true
            schema:
                type: string
            description: Playback ID
    responses:
        LegNotFound:
            description: Leg not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
        RoomNotFound:
            description: Room not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
    schemas:
        Leg:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                id:
                    type: string
                    description: Unique leg identifier (UUID)
                type:
                    type: string
                    description: Leg type
                    enum:
                        - sip_inbound
                        - sip_outbound
                        - webrtc
                state:
                    type: string
                    description: Leg state
                    enum:
                        - ringing
                        - early_media
                        - connected
                        - held
                        - hung_up
                room_id:
                    type: string
                    description: Room ID if the leg is in a room, empty otherwise
                muted:
                    type: boolean
                    description: Whether the leg is muted (cannot be heard by others)
                deaf:
                    type: boolean
                    description: Whether the leg is deaf (cannot hear others)
                accept_dtmf:
                    type: boolean
                    description: Whether the leg receives DTMF digits broadcast from other legs in the same room. Defaults to true.
                held:
                    type: boolean
                    description: Whether the call is on hold (SIP legs only)
                app_id:
                    type: string
                    description: Application identifier for event stream filtering.
                sip_headers:
                    type: object
                    additionalProperties:
                        type: string
                    description: X-* headers from the inbound INVITE. Only present on sip_inbound legs.
            required:
                - id
                - type
                - state
                - muted
                - deaf
                - accept_dtmf
                - held
        Room:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                id:
                    type: string
                    description: Room identifier
                app_id:
                    type: string
                    description: Application identifier for event stream filtering.
                sample_rate:
                    type: integer
                    description: Mixer sample rate in Hz (8000, 16000, or 48000).
                participants:
                    type: array
                    items:
                        $ref: '#/components/schemas/Leg'
                    description: Legs currently in this room
            required:
                - id
                - sample_rate
                - participants
        Error:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                error:
                    type: string
                    description: Error message
            required:
                - error
        StatusResponse:
            type: object
            properties:
                instance_id:
                    type: string
                    description: Instance identifier
                status:
                    type: string
            required:
                - status
        AddLegRequest:
            type: object
            properties:
                leg_id:
                    type: string
                    description: ID of the leg to add
                mute:
                    type: boolean
                    description: If set, apply this mute state to the leg atomically before it joins the mixer (no race where un-muted audio enters the mix). Omit to leave current state untouched (useful when moving between rooms).
                deaf:
                    type: boolean
                    description: If set, apply this deaf state to the leg atomically before it joins the mixer. Omit to leave current state untouched.
                accept_dtmf:
                    type: boolean
                    description: If set, control whether this leg receives DTMF digits broadcast from other legs in the same room. Omit to leave current state untouched (default for new legs is true).
            required:
                - leg_id
        AgentMessageRequest:
            type: object
            properties:
                message:
                    type: string
                    description: Context or instruction to inject into the running agent session
            required:
                - message
        CreateLegRequest:
            type: object
            properties:
                type:
                    type: string
                    description: Leg type
                    enum:
                        - sip
                uri:
                    type: string
                    description: SIP URI to dial
                from:
                    type: string
                    description: Caller ID — sets the user part of the SIP From header (e.g. "+15551234567", "alice")
                privacy:
                    type: string
                    description: SIP Privacy header value (e.g. "id", "none")
                ring_timeout:
                    type: integer
                    description: Seconds to wait for answer; 0 = no timeout
                    default: 0
                max_duration:
                    type: integer
                    description: Maximum call duration in seconds after connect. Automatically hung up when reached. 0 or omitted = no limit.
                    default: 0
                codecs:
                    type: array
                    items:
                        type: string
                        enum:
                            - PCMU
                            - PCMA
                            - G722
                            - opus
                    description: Codec preference order
                headers:
                    type: object
                    additionalProperties:
                        type: string
                    description: Custom SIP headers to include in the outbound INVITE (e.g. X-Correlation-ID)
                room_id:
                    type: string
                    description: Room ID to auto-add the leg to once media is ready (early_media or connected). If the room does not exist, it is automatically created.
                auth:
                    description: SIP digest authentication credentials. If the remote challenges with 401/407, sipgo will retry with these credentials.
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/SIPAuth'
                webhook_url:
                    type: string
                    description: Route all events for this leg exclusively to this URL instead of global webhooks.
                    format: uri
                webhook_secret:
                    type: string
                    description: HMAC-SHA256 signing secret for the per-leg webhook.
                amd:
                    description: Enable Answering Machine Detection on outbound calls. Include the object (even empty) to enable with defaults; omit to disable.
                    nullable: true
                    allOf:
                        - $ref: '#/components/schemas/AMDParams'
                accept_dtmf:
                    type: boolean
                    description: If false, this leg will not receive DTMF digits broadcast from other legs in the same room. Defaults to true.
                    default: true
                app_id:
                    type: string
                    description: Application identifier. Carried through to all events for this leg. Use to filter the WebSocket event stream by app.
            required:
                - type
                - uri
        RoomCreateRequest:
            type: object
            properties:
                id:
                    type: string
                    description: Custom room ID (auto-generated UUID if omitted)
                webhook_url:
                    type: string
                    description: Route all events for this room exclusively to this URL instead of global webhooks.
                    format: uri
                webhook_secret:
                    type: string
                    description: HMAC-SHA256 signing secret for the per-room webhook.
                app_id:
                    type: string
                    description: Application identifier. Carried through to all events for this room. Use to filter the WebSocket event stream by app.
                sample_rate:
                    type: integer
                    description: 'Mixer sample rate in Hz. Allowed values: 8000, 16000, 48000. Default: 16000.'
                    enum:
                        - "8000"
                        - "16000"
                        - "48000"
                    default: 16000
            required:
                - id
        DTMFRequest:
            type: object
            properties:
                digits:
                    type: string
                    description: 'DTMF digits to send (0-9, *, #)'
            required:
                - digits
        DeepgramAgentRequest:
            type: object
            properties:
                settings:
                    type: object
                    additionalProperties:
                        type: string
                    description: Full Deepgram agent settings object (agent.listen, agent.think, agent.speak, etc.). When omitted, sensible defaults are used (nova-3 STT, gpt-4o-mini LLM, aura-2-asteria-en TTS).
                greeting:
                    type: string
                    description: Agent greeting message
                language:
                    type: string
                    description: Language code (e.g. "en", "es")
                api_key:
                    type: string
                    description: API key override (falls back to DEEPGRAM_API_KEY env var)
        ElevenLabsAgentRequest:
            type: object
            properties:
                agent_id:
                    type: string
                    description: ElevenLabs agent ID
                first_message:
                    type: string
                    description: Override the agent's first message
                language:
                    type: string
                    description: Language code (e.g. "en", "es")
                dynamic_variables:
                    type: object
                    additionalProperties:
                        type: string
                    description: Key-value pairs passed to the agent as dynamic variables
                api_key:
                    type: string
                    description: API key override (falls back to ELEVENLABS_API_KEY env var)
            required:
                - agent_id
        PipecatAgentRequest:
            type: object
            properties:
                websocket_url:
                    type: string
                    description: WebSocket URL of the Pipecat bot (e.g. ws://my-bot:8765)
                    format: uri
            required:
                - websocket_url
        PlaybackRequest:
            type: object
            properties:
                url:
                    type: string
                    description: URL of the audio file (mutually exclusive with tone)
                    format: uri
                tone:
                    type: string
                    description: 'Built-in telephone tone name. Format: {country}_{type} or bare {type} (defaults to US). Types: ringback, busy, dial, congestion. Countries: us, gb, de, fr, au, jp, it, in, br, pl, ru. Examples: us_ringback, gb_busy, dial.'
                mime_type:
                    type: string
                    description: MIME type (e.g. audio/wav). Required when using url.
                repeat:
                    type: integer
                    description: Number of times to repeat playback (url only)
                    default: 0
                volume:
                    type: integer
                    description: Volume adjustment in dB (-8 to 8)
                    default: 0
                    minimum: -8
                    maximum: 8
            required:
                - url
                - tone
                - mime_type
                - repeat
                - volume
            oneOf:
                - required:
                    - url
                    - mime_type
                - required:
                    - tone
        RecordingRequest:
            type: object
            properties:
                storage:
                    type: string
                    description: '"file" (default) — local disk, "s3" — upload to S3 after recording stops'
                    enum:
                        - file
                        - s3
                multi_channel:
                    type: boolean
                    description: When true, record each participant to a separate mono WAV file in addition to the full mix. Only applies to room recordings.
                    default: false
                s3_bucket:
                    type: string
                    description: S3 bucket name. Overrides S3_BUCKET env var. Required if env var is not set.
                s3_region:
                    type: string
                    description: AWS region. Overrides S3_REGION env var. Default us-east-1.
                s3_endpoint:
                    type: string
                    description: Custom S3 endpoint (MinIO, etc.). Overrides S3_ENDPOINT env var.
                s3_prefix:
                    type: string
                    description: Key prefix (e.g. recordings/). Overrides S3_PREFIX env var.
                s3_access_key:
                    type: string
                    description: AWS access key ID. Overrides default credential chain.
                s3_secret_key:
                    type: string
                    description: AWS secret access key. Must be set together with s3_access_key.
            required:
                - storage
                - multi_channel
                - s3_bucket
                - s3_region
                - s3_endpoint
                - s3_prefix
                - s3_access_key
                - s3_secret_key
        STTRequest:
            type: object
            properties:
                language:
                    type: string
                    description: Language code (e.g. "en", "es")
                partial:
                    type: boolean
                    description: Emit partial (non-final) transcripts
                    default: false
                provider:
                    type: string
                    description: 'STT provider: "elevenlabs" (default) or "deepgram"'
                    enum:
                        - elevenlabs
                        - deepgram
                api_key:
                    type: string
                    description: API key override (falls back to ELEVENLABS_API_KEY or DEEPGRAM_API_KEY env var depending on provider)
            required:
                - language
                - partial
        TTSRequest:
            type: object
            properties:
                text:
                    type: string
                    description: Text to synthesize
                voice:
                    type: string
                    description: 'Provider-specific voice identifier. ElevenLabs: voice name or ID. AWS Polly: voice ID (e.g. Joanna, Matthew). Google Cloud: voice name — either full format (e.g. en-US-Neural2-F) or short name for Gemini models (e.g. Achernar, Kore). Deepgram: model name (e.g. aura-2-asteria-en).'
                model_id:
                    type: string
                    description: 'Provider-specific model/engine. ElevenLabs: model ID. AWS Polly: engine (standard, neural, long-form, generative; default neural). Google Cloud: model name (e.g. gemini-2.5-pro-tts, chirp3-hd).'
                language:
                    type: string
                    description: Language code (e.g. "en-US", "pl-pl"). Required for Google Gemini TTS voices that use short names (e.g. Achernar). Auto-extracted from full voice names like en-US-Neural2-F.
                prompt:
                    type: string
                    description: Style/tone instruction for promptable voice models (Google Gemini TTS only). E.g. "Read aloud in a warm, welcoming tone."
                volume:
                    type: integer
                    description: Volume adjustment in dB (-8 to 8)
                    default: 0
                    minimum: -8
                    maximum: 8
                provider:
                    type: string
                    description: 'TTS provider: "elevenlabs" (default), "aws", "google", or "deepgram"'
                    enum:
                        - elevenlabs
                        - aws
                        - google
                        - deepgram
                api_key:
                    type: string
                    description: 'ElevenLabs: API key override (falls back to ELEVENLABS_API_KEY env var). AWS: optional ACCESS_KEY:SECRET_KEY override (falls back to default AWS credential chain). Google Cloud: optional API key override (falls back to Application Default Credentials). Deepgram: API key override (falls back to DEEPGRAM_API_KEY env var).'
            required:
                - text
                - voice
                - model_id
                - volume
        TransferRequest:
            type: object
            properties:
                target:
                    type: string
                    description: SIP URI to transfer the call to (e.g. "sip:bob@example.com").
                replaces_leg_id:
                    type: string
                    description: ID of an existing connected SIP leg whose dialog should be replaced (attended transfer). Omit for blind transfer.
            required:
                - target
        VAPIAgentRequest:
            type: object
            properties:
                assistant_id:
                    type: string
                    description: VAPI assistant ID
                first_message:
                    type: string
                    description: Override the agent's first message
                variable_values:
                    type: object
                    additionalProperties:
                        type: string
                    description: Key-value pairs passed as VAPI variable values (assistantOverrides.variableValues)
                api_key:
                    type: string
                    description: API key override (falls back to VAPI_API_KEY env var)
            required:
                - assistant_id
        VolumeRequest:
            type: object
            properties:
                volume:
                    type: integer
                    description: Volume adjustment (-8 to 8, ~3dB per step, 0 = unchanged)
                    minimum: -8
                    maximum: 8
            required:
                - volume
        WebRTCOfferRequest:
            type: object
            properties:
                sdp:
                    type: string
                    description: SDP offer from the browser
            required:
                - sdp
        AMDParams:
            type: object
            properties:
                initial_silence_timeout:
                    type: integer
                    description: Max milliseconds of silence before declaring no_speech
                    default: 2500
                greeting_duration:
                    type: integer
                    description: Speech duration threshold (ms) above which answerer is classified as machine
                    default: 1500
                after_greeting_silence:
                    type: integer
                    description: Silence duration (ms) after initial speech to declare human
                    default: 800
                total_analysis_time:
                    type: integer
                    description: Max analysis window in milliseconds
                    default: 5000
                minimum_word_length:
                    type: integer
                    description: Minimum speech burst duration (ms) to count as a word
                    default: 100
                beep_timeout:
                    type: integer
                    description: Max time (ms) to wait for the voicemail beep after machine detection. 0 or omitted = disabled.
                    default: 0
        SIPAuth:
            type: object
            properties:
                username:
                    type: string
                    description: SIP auth username
                password:
                    type: string
                    description: SIP auth password
            required:
                - username
                - password
        WebhookEvent:
            type: object
            description: Event envelope delivered via HTTP POST to registered webhook URLs. Event-specific fields are flattened into the top-level object (no "data" wrapper). Includes X-Signature-256 header when a secret is configured.
            properties:
                type:
                    $ref: '#/components/schemas/WebhookEventType'
                timestamp:
                    type: string
                    format: date-time
                instance_id:
                    type: string
                    description: Instance identifier
            required:
                - type
                - timestamp
        WebhookEventType:
            type: string
            enum:
                - leg.ringing
                - leg.early_media
                - leg.connected
                - leg.disconnected
                - leg.joined_room
                - leg.left_room
                - leg.muted
                - leg.unmuted
                - leg.hold
                - leg.unhold
                - dtmf.received
                - speaking.started
                - speaking.stopped
                - playback.started
                - playback.finished
                - playback.error
                - tts.started
                - tts.finished
                - tts.error
                - recording.started
                - recording.finished
                - recording.paused
                - recording.resumed
                - leg.transfer_initiated
                - leg.transfer_requested
                - leg.transfer_progress
                - leg.transfer_completed
                - leg.transfer_failed
                - room.created
                - room.deleted
                - stt.text
                - agent.connected
                - agent.disconnected
                - agent.user_transcript
                - agent.agent_response
        ICECandidateInit:
            type: object
            properties:
                candidate:
                    type: string
                    description: ICE candidate string
                sdpMid:
                    type: string
                    description: Media stream identification tag
                sdpMLineIndex:
                    type: integer
                    description: Index of the media description
            required:
                - candidate
x-webhooks:
    leg.ringing:
        post:
            summary: SIP call ringing (inbound or outbound)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    leg_type:
                                        type: string
                                        description: Leg type (e.g. sip_inbound, sip_outbound)
                                    uri:
                                        type: string
                                        description: Dialed SIP URI (outbound only)
                                    from:
                                        type: string
                                        description: Caller URI (inbound) or From header value (outbound, if set)
                                    to:
                                        type: string
                                        description: Callee URI (inbound only)
                                    sip_headers:
                                        type: object
                                        additionalProperties:
                                            type: string
                                        description: X-* custom SIP headers, if present
    leg.early_media:
        post:
            summary: Outbound leg received 183 Session Progress with SDP; media pipeline active
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    leg_type:
                                        type: string
                                        description: Leg type (e.g. sip_outbound)
    leg.connected:
        post:
            summary: Leg answered/connected
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    leg_type:
                                        type: string
                                        description: Leg type (e.g. sip_inbound, sip_outbound, webrtc)
    leg.disconnected:
        post:
            summary: Leg hung up (CDR-style nested structure)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    cdr:
                                        type: object
                                        properties:
                                            reason:
                                                type: string
                                                description: Disconnect reason. Common SIP failures are mapped to named reasons; unmapped 4xx/5xx/6xx codes appear as sip_{code}.
                                                enum:
                                                    - api_hangup
                                                    - remote_bye
                                                    - caller_cancel
                                                    - ring_timeout
                                                    - max_duration
                                                    - busy
                                                    - unavailable
                                                    - not_found
                                                    - forbidden
                                                    - unauthorized
                                                    - timeout
                                                    - cancelled
                                                    - not_acceptable
                                                    - service_unavailable
                                                    - declined
                                                    - rtp_timeout
                                                    - session_expired
                                                    - invite_failed
                                                    - connect_failed
                                                    - ice_failure
                                            duration_total:
                                                type: number
                                                description: Seconds from leg creation to disconnect
                                            duration_answered:
                                                type: number
                                                description: Seconds from answer to disconnect (0 if never answered)
                                        required:
                                            - reason
                                            - duration_total
                                            - duration_answered
                                    quality:
                                        description: RTP quality metrics. Omitted for WebRTC legs or unanswered legs with no media.
                                        type: object
                                        nullable: true
                                        properties:
                                            mos_score:
                                                type: number
                                                description: Mean Opinion Score (1.0–5.0) estimated via simplified E-model (ITU-T G.107) from packet loss and jitter
                                            rtp_packets_received:
                                                type: integer
                                                description: Total inbound RTP audio packets received
                                            rtp_packets_lost:
                                                type: integer
                                                description: Estimated lost packets based on sequence number gaps
                                            rtp_jitter_ms:
                                                type: number
                                                description: Inter-arrival jitter in milliseconds (RFC 3550 §A.8)
                                        required:
                                            - mos_score
                                            - rtp_packets_received
                                            - rtp_packets_lost
                                            - rtp_jitter_ms
    leg.joined_room:
        post:
            summary: Leg added to a room
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    room_id:
                                        type: string
                                        description: Room identifier
                                    app_id:
                                        type: string
    leg.left_room:
        post:
            summary: Leg removed from a room
