                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /rooms/{id}/routing:
        parameters:
            - $ref: '#/components/parameters/RoomId'
        get:
            operationId: getRoomRouting
            summary: Get the room's audio routing matrix
            description: Returns the per-listener-role source whitelist used by the room's audio mixer. A listener role absent from the matrix defaults to full mesh (hears every other leg). A role with an empty `[]` list is an isolated listener that hears nothing.
            tags:
                - Rooms
            responses:
                '200':
                    description: Current matrix
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RoomRoutingView'
                '404':
                    description: Room not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        put:
            operationId: setRoomRouting
            summary: Replace the room's audio routing matrix
            description: Atomically replaces the room's audio routing matrix and recomputes every leg's per-listener source whitelist in one mixer-mutex acquisition. The next mix tick (≤ 20 ms) reflects the new routing. Roles are operator-supplied strings (e.g. "customer", "agent", "supervisor"). A leg with no role defaults to full mesh.
            tags:
                - Rooms
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoomRoutingRequest'
            responses:
                '200':
                    description: Updated matrix
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RoomRoutingView'
                '400':
                    description: Invalid JSON
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Room not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        patch:
            operationId: updateRoomRouting
            summary: Replace selected rows of the room's audio routing matrix
            description: 'Replaces the listed listener-role rows. Pass `"sources": null` on an update to clear that row back to full mesh.'
            tags:
                - Rooms
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoomRoutingUpdateRequest'
            responses:
                '200':
                    description: Updated matrix
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RoomRoutingView'
                '400':
                    description: Invalid JSON
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Room not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
