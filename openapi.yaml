                                    text:
                                        type: string
                                        description: Agent response text
    amd.result:
        post:
            summary: Answering machine detection completed
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    result:
                                        type: string
                                        description: 'Detection result: human, machine, no_speech, or not_sure'
                                    initial_silence_ms:
                                        type: integer
                                        description: Milliseconds of silence before first speech
                                    greeting_duration_ms:
                                        type: integer
                                        description: Milliseconds of speech in the greeting
                                    total_analysis_ms:
                                        type: integer
                                        description: Total milliseconds of analysis before determination
    amd.beep:
        post:
            summary: Voicemail beep tone detected after machine classification
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
