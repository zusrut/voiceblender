openapi: 3.1.0
info:
    title: VoiceBlender API
    description: |
        VoiceBlender bridges SIP and WebRTC voice calls with multi-party audio mixing, real-time speech-to-text, text-to-speech, AI agent integration, recording, and webhook-based event delivery.
    x-config-vars:
        - name: INSTANCE_ID
          default: (auto-generated UUID)
          description: Instance identifier included in all API responses and webhook events
        - name: HTTP_ADDR
          default: :8080
          description: REST API listen address
        - name: ALLOWED_IPS
          default: (empty = allow all)
          description: Comma-separated allowlist of IPs and CIDR ranges (IPv4 and IPv6) gating every HTTP endpoint, including /v1/vsi, /v1/legs/websocket, /v1/legs/moq, /metrics, and pprof. Bare addresses become /32 (v4) or /128 (v6); malformed entries fail server startup. Only X-Forwarded-For is consulted as a proxy header (see TRUST_PROXY_HEADERS).
        - name: TRUST_PROXY_HEADERS
          default: "false"
          description: When true, the client IP used for the ALLOWED_IPS check is taken from the leftmost X-Forwarded-For entry (falling back to the socket peer if absent). Enable only behind a trusted reverse proxy that overwrites the header — otherwise it is client-spoofable.
        - name: SIP_BIND_IP
          default: 127.0.0.1
          description: IPv4 address advertised in SDP, Contact, and Via headers (and used as the listen address when SIP_LISTEN_IP is empty)
        - name: SIP_LISTEN_IP
          default: (same as SIP_BIND_IP)
          description: UDP socket bind IP. Accepts 127.0.0.1, 0.0.0.0, ::, or any literal v4/v6 address
        - name: SIP_BIND_IPV6
          default: (empty = v4-only)
          description: IPv6 address advertised in SDP/Contact/Via for IPv6 calls. Set this for IPv6-only or dual-stack deployments
        - name: SIP_LISTEN_IPV6
          default: (same as SIP_BIND_IPV6)
          description: Optional separate IPv6 socket bind address (used when running with both 0.0.0.0 and a specific v6 literal)
        - name: SIP_EXTERNAL_IP
          default: ""
          description: Public IPv4 address for NAT/Docker deployments. When set, used in SIP Contact headers and SDP media (c=) lines instead of the bind IP. IPv6 has no equivalent — set SIP_BIND_IPV6 to the address you want advertised.
        - name: SIP_PORT
          default: "5060"
          description: SIP listen port
        - name: SIP_TLS_PORT
          default: (disabled)
          description: SIP-over-TLS listen port (typically 5061). When set, SIP_TLS_CERT and SIP_TLS_KEY must also be provided. Required for WhatsApp Business Calling integration.
        - name: SIP_TLS_CERT
          default: ""
          description: Path to PEM-encoded TLS certificate (e.g. fullchain.pem). Meta rejects self-signed certs — use a CA-signed cert matching a public FQDN.
        - name: SIP_TLS_KEY
          default: ""
          description: Path to PEM-encoded TLS private key (e.g. privkey.pem).
        - name: SIP_DEBUG
          default: "false"
          description: When true, log the full RFC 3261 wire form of every inbound and outbound SIP request and response. Very verbose — use only for troubleshooting.
        - name: SIP_DOMAIN
          default: (falls back to advertised IP)
          description: FQDN advertised in From, Contact and Via on all outbound SIP signalling (classic trunks and WhatsApp). Should match the SAN on SIP_TLS_CERT and any allowlist your carrier or Meta keeps.
        - name: SIP_HOST
          default: voiceblender
          description: SIP User-Agent name
        - name: SIP_CODECS
          default: PCMU,PCMA
          description: 'Comma-separated, preference-ordered list of codecs the SIP engine offers on outbound INVITEs and accepts on inbound INVITEs. Recognized names (case-insensitive): PCMU, PCMA, G722, opus, AMR-WB, AMR-NB (bare token AMR resolves to AMR-NB per RFC 4867 §8.1). Unknown names and duplicates are dropped silently.'
        - name: SIP_AUTO_RINGING
          default: "false"
          description: When true, the server sends 180 Ringing automatically after 100 Trying. Default sends only 100 Trying; the API caller drives ringing via /ring, /early-media, or /answer.
        - name: SIP_USE_SOURCE_SOCKET
          default: "false"
          description: When true, route SIP responses and in-dialog requests (BYE, re-INVITE, UPDATE, INFO, NOTIFY, REFER) back to the request's source UDP socket instead of the peer's Contact / Via sent-by. Enable when peers advertise unroutable addresses (e.g. private IPs in Contact from behind NAT).
        - name: SIP_REGISTRATION_DEFAULT_EXPIRES_SECONDS
          default: "3600"
          description: Expiry used when an inbound REGISTER carries no Expires value.
        - name: SIP_REGISTRATION_MAX_EXPIRES_SECONDS
          default: "7200"
          description: Upper clamp on the granted REGISTER expiry. Requests above this value are honored at this maximum.
        - name: SIP_REGISTRATION_SWEEP_INTERVAL_MS
          default: "1000"
          description: Sweeper period (ms) for evicting expired AOR bindings.
        - name: SIP_REGISTRATION_ALLOW_MULTIPLE_CONTACTS
          default: "true"
          description: When true, the same AOR may be bound from multiple Contacts simultaneously (and POST /v1/legs parallel-forks to every bound contact). When false, each REGISTER replaces any prior Contacts for the AOR.
        - name: ICE_SERVERS
          default: stun:stun.l.google.com:19302
          description: STUN/TURN URLs for WebRTC ICE, comma-separated
        - name: WEBRTC_EXTERNAL_IPS
          default: (empty)
          description: Comma-separated public IPs advertised as host ICE candidates (pion SetNAT1To1IPs). Required when VB runs behind NAT/Docker so peers behind firewalls can reach it; supports IPv4 and IPv6 literals. The literal value "auto" triggers STUN-based public-IP discovery at startup using the configured ICE_SERVERS; failure is non-fatal.
        - name: RTP_PORT_MIN
          default: "10000"
          description: Minimum UDP port for RTP/RTCP media
        - name: RTP_PORT_MAX
          default: "20000"
          description: Maximum UDP port for RTP/RTCP media
        - name: DEFAULT_SAMPLE_RATE
          default: "16000"
          description: 'Default mixer sample rate (Hz) for new rooms when sample_rate is not specified. Allowed: 8000, 16000, 48000.'
        - name: SPEECH_DETECTION_ENABLED
          default: "false"
          description: Emit speaking.started / speaking.stopped events for every connected leg by default. Per-call speech_detection on POST /v1/legs or POST /v1/legs/{id}/answer overrides this.
        - name: VSI_EVENT_BUFFER_SIZE
          default: "256"
          description: 'Per-client buffer (in events) on the /v1/vsi WebSocket. When the client falls behind, new events are dropped and the next delivered event carries an events_dropped notification. Clamped to [16, 1000000]. Memory: ~1 KB × buffer per connection at the default.'
        - name: AMRWB_MODE
          default: "2"
          description: 'AMR-WB (G.722.2) encoder speech-mode ceiling 0..8: 0=6.60, 1=8.85, 2=12.65, 3=14.25, 4=15.85, 5=18.25, 6=19.85, 7=23.05, 8=23.85 kbit/s. The actual transmit mode is this ceiling clamped to the peer''s negotiated mode-set. Default 2 matches GSMA IR.92 / VoLTE.'
        - name: AMRWB_OCTET_ALIGNED
          default: "true"
          description: Offer octet-aligned AMR-WB framing (RFC 4867) in outbound SDP. When false, offers bandwidth-efficient framing. On answers, VoiceBlender always echoes the framing the peer negotiated.
        - name: AMRNB_MODE
          default: "7"
          description: 'AMR-NB (RFC 4867) encoder speech-mode ceiling 0..7: 0=4.75, 1=5.15, 2=5.90, 3=6.70, 4=7.40, 5=7.95, 6=10.2, 7=12.2 kbit/s. The actual transmit mode is this ceiling clamped to the peer''s negotiated mode-set. Default 7 is GSM-EFR-equivalent 12.2 kbit/s.'
        - name: AMRNB_OCTET_ALIGNED
          default: "true"
          description: Offer octet-aligned AMR-NB framing (RFC 4867) in outbound SDP. When false, offers bandwidth-efficient framing. On answers, VoiceBlender always echoes the framing the peer negotiated.
        - name: RECORDING_DIR
          default: /tmp/recordings
          description: Local directory for recording output files
        - name: LOG_LEVEL
          default: info
          description: 'Log verbosity: debug, info, warn, error'
        - name: WEBHOOK_URL
          default: ""
          description: Global webhook URL for event delivery (fallback when no per-leg or per-room webhook is set)
        - name: WEBHOOK_SECRET
          default: ""
          description: HMAC-SHA256 signing secret for the global webhook
        - name: ELEVENLABS_API_KEY
          default: ""
          description: API key for ElevenLabs TTS, STT, and Agent provider
        - name: VAPI_API_KEY
          default: ""
          description: API key for VAPI Agent provider
        - name: DEEPGRAM_API_KEY
          default: ""
          description: API key for Deepgram STT and TTS
        - name: AZURE_SPEECH_KEY
          default: ""
          description: Subscription key for Azure Cognitive Speech Services (TTS and STT)
        - name: AZURE_SPEECH_REGION
          default: eastus
          description: Azure region for Speech Services (e.g. eastus, westeurope)
        - name: S3_BUCKET
          default: ""
          description: S3 bucket name for recording uploads
        - name: S3_REGION
          default: us-east-1
          description: AWS region for S3
        - name: S3_ENDPOINT
          default: ""
          description: Custom S3-compatible endpoint (e.g. MinIO)
        - name: S3_PREFIX
          default: ""
          description: Key prefix applied to all S3 objects
        - name: AWS_ACCESS_KEY_ID
          default: ""
          description: '[SDK-resolved, not read by VoiceBlender] AWS access key for S3 uploads and AWS Polly TTS. Consumed by the AWS SDK default credential chain alongside AWS_SECRET_ACCESS_KEY and the optional AWS_SESSION_TOKEN.'
        - name: AWS_SECRET_ACCESS_KEY
          default: ""
          description: '[SDK-resolved, not read by VoiceBlender] AWS secret key paired with AWS_ACCESS_KEY_ID.'
        - name: AWS_SESSION_TOKEN
          default: ""
          description: '[SDK-resolved, not read by VoiceBlender] Optional temporary-credential session token (STS / SSO) used together with AWS_ACCESS_KEY_ID/SECRET.'
        - name: AWS_PROFILE
          default: ""
          description: '[SDK-resolved, not read by VoiceBlender] Profile name in ~/.aws/credentials to use instead of static AWS_* env vars.'
        - name: AWS_REGION
          default: ""
          description: '[SDK-resolved, not read by VoiceBlender] AWS region used by S3 and Polly when S3_REGION is empty.'
        - name: GOOGLE_APPLICATION_CREDENTIALS
          default: ""
          description: '[SDK-resolved, not read by VoiceBlender] Path to a Google Cloud service-account JSON file used by Google Cloud TTS when no per-request api_key is supplied. Consumed by Google''s Application Default Credentials chain.'
        - name: TTS_CACHE_ENABLED
          default: "false"
          description: Enable disk-backed TTS audio cache; cached audio persists across restarts
        - name: TTS_CACHE_DIR
          default: /tmp/tts_cache
          description: Directory for cached TTS audio files (used when TTS_CACHE_ENABLED=true)
        - name: TTS_CACHE_INCLUDE_API_KEY
          default: "false"
          description: Include API key in TTS cache key; set true if different keys map to different voice clones
        - name: SIP_JITTER_BUFFER_MS
          default: "0"
          description: SIP ingress jitter buffer target delay in ms (0 = disabled passthrough). Applies to every SIP leg.
        - name: SIP_JITTER_BUFFER_MAX_MS
          default: "300"
          description: Maximum depth of the SIP ingress jitter buffer in ms. Frames beyond this are dropped oldest-first to catch up after a stall.
        - name: SIP_REFER_AUTO_DIAL
          default: "false"
          description: 'When true, accept incoming SIP REFER requests and automatically originate the transferred call. Default-deny: stays off unless the SIP edge is locked down (IP allow-lists, digest auth) because auto-dialing arbitrary Refer-To URIs is a classic toll-fraud vector. Outbound transfers initiated via the REST API are unaffected by this flag.'
        - name: MOQ_ENABLED
          default: "false"
          description: Enable the experimental MoQ (Media over QUIC) inbound leg endpoint at CONNECT /v1/legs/moq over WebTransport/HTTP/3. PoC quality, tracks IETF draft-11. When enabled, both MOQ_TLS_CERT_FILE and MOQ_TLS_KEY_FILE must be set.
        - name: MOQ_LISTEN_ADDR
          default: :8443
          description: UDP address for the HTTP/3 listener that backs the MoQ leg. Independent of HTTP_ADDR — TCP/:8080 and UDP/:8443 can run side-by-side.
        - name: MOQ_TLS_CERT_FILE
          default: ""
          description: Path to the TLS certificate used by the HTTP/3 listener. Required when MOQ_ENABLED=true.
        - name: MOQ_TLS_KEY_FILE
          default: ""
          description: Path to the TLS private key used by the HTTP/3 listener. Required when MOQ_ENABLED=true.
        - name: MOQ_OPUS_BITRATE
          default: "24000"
          description: Target bitrate (bps) for the Opus encoder feeding the MoQ leg's mix track. Must be in 6000..510000.
        - name: LIVEKIT_ENABLED
          default: "false"
          description: Enable the livekit_room leg type at POST /v1/legs (type=livekit_room). Lets VoiceBlender join a LiveKit room as a participant and bridge audio between SIP and LiveKit. Speaks the LiveKit signaling protocol directly via livekit/protocol protobufs over the existing pion stack — no LiveKit SDK is used.
        - name: LIVEKIT_URL
          default: ""
          description: Default LiveKit server endpoint (wss://...). Required when LIVEKIT_ENABLED=true unless every request supplies livekit.url. Overridable per-request.
        - name: LIVEKIT_OPUS_BITRATE
          default: "24000"
          description: Target bitrate (bps) for the Opus encoder publishing audio into LiveKit. Must be in 6000..510000. Overridable per-request via livekit.opus_bitrate.
        - name: LIVEKIT_TOKEN_SIGNING_ENABLED
          default: "false"
          description: 'Opt-in: when true, callers may omit livekit.token and instead pass {room,identity,permissions}; VoiceBlender mints the JWT itself. Security caveat: enabling this stores the LiveKit API secret (a high-privilege credential) in VoiceBlender. Keep off in multi-tenant deployments.'
        - name: LIVEKIT_API_KEY
          default: ""
          description: LiveKit API key used to sign minted JWTs. Required only when LIVEKIT_TOKEN_SIGNING_ENABLED=true.
        - name: LIVEKIT_API_SECRET
          default: ""
          description: LiveKit API secret used to sign minted JWTs. Required only when LIVEKIT_TOKEN_SIGNING_ENABLED=true. Treat as a high-value secret; redact in logs.
        - name: LIVEKIT_DEFAULT_TOKEN_TTL
          default: 6h
          description: Default TTL applied to minted JWTs when the request omits livekit.token_ttl. Go duration string. LiveKit recommends ≤ 6 hours.
    version: 1.0.0
    license:
        name: MIT
servers:
    - url: http://localhost:8080/v1
      description: Local development server
tags:
    - name: Legs
      description: Voice call legs (SIP or WebRTC)
    - name: Rooms
      description: Multi-party audio conference rooms
    - name: WebRTC
      description: WebRTC peer connection establishment
    - name: Observability
      description: Metrics and health endpoints
paths:
    /legs:
        post:
            operationId: createLeg
            summary: Originate an outbound leg
            description: 'Originate a new outbound leg. The `type` field selects the transport: `sip` originates a SIP INVITE; `whatsapp` originates a WhatsApp call through Meta; `websocket` dials a remote WebSocket endpoint (audio is PCM in either binary or `json_base64` framing, with bidirectional text and caller-supplied X-/P- headers).'
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateLegRequest'
            responses:
                '201':
                    description: Leg created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Leg'
                '400':
                    description: Invalid JSON, bad URI/URL, unknown codec, or unsupported type
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        get:
            operationId: listLegs
            summary: List all active legs
            tags:
                - Legs
            responses:
                '200':
                    description: Array of legs
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Leg'
    /legs/websocket:
        get:
            operationId: wsLeg
            summary: Connect a WebSocket as a leg (HTTP upgrade)
            description: 'Upgrades the HTTP request to a WebSocket and creates a `websocket_in` leg. Query parameters: `sample_rate` (8000/16000/24000/48000; default 16000); `wire_format` (`binary` default, or `json_base64`); `sample_format` (`s16le` only in v1); `room_id` to auto-add the leg to a room; `app_id` for event filtering; `rtt=true` to enable the bidirectional text channel; `webhook_url`/`webhook_secret` for per-leg event routing. X-* and P-* request headers (plus Authorization) are captured into the leg''s `headers` map and surfaced on `leg.ringing` and in `LegView`. The leg goes straight to `connected` (no ringing/answer flow). Audio frames carry PCM16-LE mono at `sample_rate`; with `wire_format=binary` each WebSocket binary frame is exactly one 20ms PCM frame, with `json_base64` the same payload is wrapped as `{"type":"audio","audio":"<base64>"}`. Text and control messages always use JSON text frames: `{"type":"text","text":...}`, `{"type":"ping","event_id":N}`/`{"type":"pong","event_id":N}`, and `{"type":"hangup"}` to terminate from the peer side.'
            tags:
                - Legs
            responses:
                '101':
                    description: Switching Protocols — WebSocket upgrade succeeded
                '400':
                    description: Invalid query parameters
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Room create failure
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/moq:
        post:
            operationId: moqLeg
            summary: Connect a MoQ (Media over QUIC) leg (WebTransport extended-CONNECT, experimental)
            description: |-
                **Actual HTTP method: `CONNECT`** (HTTP/3 extended-CONNECT for WebTransport). OpenAPI 3.1 does not define `connect` as a path-item method, so this operation is documented under `post` with an `x-actual-method: CONNECT` extension. Standard HTTP clients (e.g. `curl -X POST`) will receive `405 Method Not Allowed` — use a WebTransport-capable HTTP/3 client.

                **Experimental / PoC.** Upgrades an HTTP/3 extended-CONNECT request to a WebTransport session and creates an inbound MoQ leg. Reachable only over HTTP/3 on the MoQ listener (not on the regular HTTP/1.1 chi listener). Requires `MOQ_ENABLED=true` plus `MOQ_TLS_CERT_FILE` and `MOQ_TLS_KEY_FILE`. Speaks IETF draft-11 of moq-transport (via `mengelbart/moqtransport`); browser interop with draft-16 clients (moqtail, moq.dev) is not expected to work. Media is bidirectional within a single MoQ session per leg: the server publishes namespace `mix`/track `audio` (downlink, room mix) and subscribes to namespace `mic`/track `audio` (uplink, leg mic). Audio is Opus framed one frame per MoQ Object (LOC-style) at 48 kHz mono, 20 ms frames. Query parameters: `sample_rate` (only `48000` is accepted — the encoder/decoder are hard-wired to 48 kHz; default 48000); `room_id` to auto-add the leg to a room; `app_id` for event filtering; `webhook_url`/`webhook_secret` for per-leg event routing. X-* and P-* request headers (plus Authorization) are captured into the leg's `headers` map and surfaced on `LegView`. The leg goes straight to `connected` (no ringing/answer flow); no DTMF, no RTT, and event parity is limited to `leg.connected` / `leg.disconnected`.
            tags:
                - Legs
            responses:
                '200':
                    description: WebTransport extended-CONNECT accepted; MoQ session established (no JSON body — the response is the upgraded WebTransport session)
                '400':
                    description: Invalid query parameters or config
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Room create failure
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '503':
                    description: MoQ endpoint is not enabled (`MOQ_ENABLED=false`)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
            x-actual-method: CONNECT
    /legs/{id}:
        parameters:
            - $ref: '#/components/parameters/LegId'
        get:
            operationId: getLeg
            summary: Get a single leg
            tags:
                - Legs
            responses:
                '200':
                    description: Leg details
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Leg'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: deleteLeg
            summary: Hang up a leg (asynchronous)
            description: |-
                Validates the leg exists and queues a hangup. The HTTP call returns 202 as soon as the leg is found; the SIP work and cleanup run in the background, and the eventual disconnection is observed via the `leg.disconnected` event.

                Without a request body the legacy behavior is preserved: SIP BYE on connected legs (`cdr.reason: "api_hangup"`), or dialog cancel on unanswered inbound legs (`cdr.reason: "caller_cancel"`).

                With `{"reason": "<value>"}` and an unanswered SIP inbound leg (state `ringing` or `early_media`), VoiceBlender sends a final non-2xx response instead of BYE/cancel: `busy`→486, `declined`/`rejected`→603, `unavailable`→480, `not_found`→404, `forbidden`→403, `server_error`→500. The reason value is passed through to `leg.disconnected`'s `cdr.reason`.

                For connected legs the request body is ignored.
            tags:
                - Legs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DeleteLegRequest'
            responses:
                '202':
                    description: Hangup queued
                '400':
                    description: Unknown reason value
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/answer:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: answerLeg
            summary: Answer a ringing or early-media inbound SIP leg (asynchronous)
            description: Signals the inbound-call goroutine to send 200 OK. The HTTP call returns 202 immediately; the actual SIP 200 OK is sent in the background, and the leg's transition is observed via `leg.connected`. Pre-condition failures (wrong state, unknown codec) still return 4xx synchronously.
            tags:
                - Legs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AnswerLegRequest'
            responses:
                '202':
                    description: Answer queued
                '400':
                    description: Not a SIP inbound leg, invalid body, or codec not in offer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in ringing or early_media state
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/ring:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: ringLeg
            summary: Send 180 Ringing on a ringing inbound SIP leg (asynchronous)
            description: 'Queues a SIP 180 Ringing provisional response with no SDP. Use when `SIP_AUTO_RINGING=false` (the default) and you want to indicate alerting before deciding to early-media or answer. Idempotent: each call emits another 180 — receivers tolerate re-sends. The HTTP call returns 202 as soon as the request is validated; SIP-level send failures surface as `leg.command_failed` with `command="ring"`.'
            tags:
                - Legs
            responses:
                '202':
                    description: 180 Ringing queued
                '400':
                    description: Not a SIP inbound leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in ringing state
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/challenge:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: challengeLeg
            summary: Challenge a ringing inbound SIP leg with a 401 digest auth request
            description: Sends a SIP 401 Unauthorized carrying a `WWW-Authenticate` digest challenge on an unanswered inbound INVITE. The current leg is torn down (a `leg.disconnected` with `reason="challenged"` is published); the UAC's credentialed re-INVITE arrives as a new inbound call surfaced via `leg.ringing` with `authenticated=true` once VoiceBlender verifies the response against the supplied credential. Provide either `password` or `ha1`. An invalid retry is answered with 403 Forbidden and never surfaced.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ChallengeRequest'
            responses:
                '202':
                    description: 401 challenge queued
                '400':
                    description: Not a SIP inbound leg, or missing realm/credential
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in ringing or early_media state
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/early-media:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: earlyMediaLeg
            summary: Enable early media on a ringing inbound SIP leg (asynchronous)
            description: Queues a SIP 183 Session Progress with SDP and the RTP/codec setup. The HTTP call returns 202 as soon as the request is validated; the leg transitions to `early_media` state asynchronously, observable via `leg.early_media`. Setup failures surface as `leg.command_failed` with `command="early_media"`.
            tags:
                - Legs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/EarlyMediaLegRequest'
            responses:
                '202':
                    description: Early media queued
                '400':
                    description: Not a SIP inbound leg or codec not in offer
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg is not in ringing state
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/mute:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: muteLeg
            summary: Mute a leg
            description: A muted leg's audio is excluded from the room mix and speaking events are suppressed. Taps (recording/STT) still receive the muted leg's own audio.
            tags:
                - Legs
            responses:
                '200':
                    description: Leg muted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: unmuteLeg
            summary: Unmute a leg
            tags:
                - Legs
            responses:
                '200':
                    description: Leg unmuted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StatusResponse'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/hold:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: holdLeg
            summary: Put a SIP call on hold (asynchronous)
            description: Queues a re-INVITE with `sendonly` SDP direction. The HTTP call returns 202 as soon as the leg is validated; the re-INVITE is sent in the background and success surfaces as `leg.hold`. Failures surface as `leg.command_failed` with `command="hold"`. The RTP timeout is paused while held, and a 2-hour auto-hangup timer starts.
            tags:
                - Legs
            responses:
                '202':
                    description: Hold queued
                '400':
                    description: Not a SIP leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Hold not supported for this leg type (e.g. WhatsApp)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            operationId: unholdLeg
            summary: Resume a held SIP call (asynchronous)
            description: Queues a re-INVITE with `sendrecv` SDP direction. The HTTP call returns 202; success surfaces as `leg.unhold`, failures as `leg.command_failed` with `command="unhold"`.
            tags:
                - Legs
            responses:
                '202':
                    description: Unhold queued
                '400':
                    description: Not a SIP leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Hold not supported for this leg type (e.g. WhatsApp)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/transfer:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: transferLeg
            summary: Transfer a SIP leg via REFER (asynchronous)
            description: Asynchronously transfers a SIP leg. The HTTP call returns 202 as soon as the request is validated; the REFER is sent in the background and its outcome is surfaced through `leg.transfer_initiated` / `leg.transfer_progress` / `leg.transfer_completed` / `leg.transfer_failed` events. Blind transfer when `replaces_leg_id` is omitted; attended transfer when present (the named leg's dialog identity is embedded as a Replaces parameter per RFC 3891). On terminal 2xx the leg (and the replaces leg, if any) is hung up automatically.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TransferRequest'
            responses:
                '202':
                    description: Transfer request accepted for processing
                '400':
                    description: Missing or invalid target URI (including URIs without a host such as sip:)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: Leg not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Leg not connected, not a SIP leg, or replaces_leg_id is invalid
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/transfer/accept:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: acceptTransfer
            summary: Accept a parked inbound REFER
            description: Accepts an inbound transfer surfaced via `leg.transfer_requested` (default app-driven model, `SIP_REFER_AUTO_DIAL=false`). Sends `202 Accepted` to the referrer and a `NOTIFY` sipfrag `100 Trying`, keeping the refer subscription open. `{id}` is the referrer leg (the leg that received the REFER). After accepting, re-bridge as needed and report progress via `.../transfer/progress` and the outcome via `.../transfer/complete`.
            tags:
                - Legs
            responses:
                '202':
                    description: Accept queued (202 + NOTIFY 100 sent)
                '404':
                    description: No pending transfer for the leg (unknown or already decided)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/transfer/progress:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: transferProgress
            summary: Report interim transfer progress
            description: Sends an interim sipfrag `NOTIFY` (e.g. `180 Ringing`) on an accepted inbound transfer so the referrer's UA reflects real progress. The subscription stays active.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TransferProgressRequest'
            responses:
                '202':
                    description: Progress NOTIFY queued
                '400':
                    description: status_code out of range (must be 100-699)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '404':
                    description: No accepted transfer for the leg
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/transfer/complete:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: completeTransfer
            summary: Complete an accepted inbound transfer
            description: Terminates an accepted inbound transfer with a final sipfrag `NOTIFY` and emits `leg.transfer_completed` (on success) or `leg.transfer_failed`. `success:true` sends `200 OK`; otherwise `status_code`/`reason` (default 500) carry the failure. The referrer leg is left for the app to hang up.
            tags:
                - Legs
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TransferCompleteRequest'
            responses:
                '202':
                    description: Terminal NOTIFY queued
                '404':
                    description: No accepted transfer for the leg (accept it first)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/transfer/decline:
        parameters:
            - $ref: '#/components/parameters/LegId'
        post:
            operationId: declineTransfer
            summary: Decline a parked inbound REFER
            description: Rejects a parked (not-yet-accepted) inbound transfer, replying to the referrer with a non-2xx (`603 Decline` by default; override via `code`/`reason`) and emitting `leg.transfer_failed`.
            tags:
                - Legs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TransferDeclineRequest'
            responses:
                '202':
                    description: Decline queued
                '404':
                    description: No pending transfer for the leg (unknown or already accepted)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /legs/{id}/dtmf:
        parameters:
