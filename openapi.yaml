                                        type: string
                                    authenticated:
                                        type: boolean
                                    auth_username:
                                        type: string
    leg.early_media:
        post:
            summary: Outbound leg received 183 Session Progress with SDP; media pipeline active
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    leg_type:
                                        type: string
                                        description: Leg type (e.g. sip_outbound)
    leg.connected:
        post:
            summary: Leg answered/connected
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    leg_type:
                                        type: string
                                        description: Leg type (e.g. sip_inbound, sip_outbound, webrtc)
    leg.disconnected:
        post:
            summary: Leg hung up (CDR-style nested structure)
            requestBody:
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: '#/components/schemas/WebhookEvent'
                                - properties:
                                    leg_id:
                                        type: string
                                        description: Leg identifier
                                    app_id:
                                        type: string
                                    cdr:
                                        type: object
                                        properties:
                                            reason:
                                                type: string
                                                description: Disconnect reason. Common SIP failures are mapped to named reasons; unmapped 4xx/5xx/6xx codes appear as sip_{code}.
                                                enum:
                                                    - api_hangup
                                                    - remote_bye
                                                    - caller_cancel
                                                    - ring_timeout
                                                    - max_duration
                                                    - busy
                                                    - unavailable
                                                    - not_found
                                                    - forbidden
                                                    - unauthorized
                                                    - timeout
                                                    - cancelled
                                                    - not_acceptable
                                                    - service_unavailable
                                                    - declined
                                                    - rtp_timeout
                                                    - session_expired
                                                    - invite_failed
                                                    - connect_failed
                                                    - ice_failure
                                            duration_total:
                                                type: number
                                                description: Seconds from leg creation to disconnect
                                            duration_answered:
                                                type: number
                                                description: Seconds from answer to disconnect (0 if never answered)
                                        required:
                                            - reason
                                            - duration_total
                                            - duration_answered
                                    quality:
                                        description: RTP quality metrics. Omitted for WebRTC legs or unanswered legs with no media.
                                        type: object
                                        nullable: true
                                        properties:
                                            mos_score:
                                                type: number
                                                description: Mean Opinion Score (1.0–5.0) estimated via simplified E-model (ITU-T G.107) from packet loss and jitter
                                            rtp_packets_received:
                                                type: integer
                                                description: Total inbound RTP audio packets received
                                            rtp_packets_lost:
                                                type: integer
                                                description: Estimated lost packets based on sequence number gaps
                                            rtp_jitter_ms:
                                                type: number
                                                description: Inter-arrival jitter in milliseconds (RFC 3550 §A.8)
                                        required:
                                            - mos_score
                                            - rtp_packets_received
                                            - rtp_packets_lost
                                            - rtp_jitter_ms
