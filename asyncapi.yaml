operations:
    recv_list_legs:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: List all active legs
        messages:
            - $ref: '#/channels/vsi/messages/list_legs'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/list_legs.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_get_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Get a single leg by id
        messages:
            - $ref: '#/channels/vsi/messages/get_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/get_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_create_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Originate an outbound leg
        description: 'Originates an outbound leg, mirroring POST /v1/legs, and returns the leg view. Supports all leg types: "sip", "websocket", "whatsapp", and "livekit_room". For "livekit_room", custom headers come from the request''s `headers` map (there is no HTTP request over the WebSocket).'
        messages:
            - $ref: '#/channels/vsi/messages/create_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/create_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_answer_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Answer a ringing inbound leg
        messages:
            - $ref: '#/channels/vsi/messages/answer_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/answer_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_delete_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Hang up a leg
        messages:
            - $ref: '#/channels/vsi/messages/delete_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/delete_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_mute_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Mute a leg
        messages:
            - $ref: '#/channels/vsi/messages/mute_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/mute_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_unmute_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Unmute a leg
        messages:
            - $ref: '#/channels/vsi/messages/unmute_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/unmute_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_deaf_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Deafen a leg (stop receiving room audio)
        messages:
            - $ref: '#/channels/vsi/messages/deaf_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/deaf_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_undeaf_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
        summary: Undeafen a leg
        messages:
            - $ref: '#/channels/vsi/messages/undeaf_leg'
        reply:
            channel:
                $ref: '#/channels/vsi'
            messages:
                - $ref: '#/channels/vsi/messages/undeaf_leg.result'
                - $ref: '#/channels/vsi/messages/error'
    recv_hold_leg:
        action: receive
        channel:
            $ref: '#/channels/vsi'
