        messages:
            - $ref: '#/channels/vsi/messages/error'
components:
    messages:
        list_legs:
            name: list_legs
            title: List all active legs
            summary: List all active legs
            payload:
                type: object
                properties:
                    type:
                        const: list_legs
                    request_id:
                        type: string
                        description: Echoed back on the matching .result/error frame; clients use it to correlate.
                    payload:
                        type: "null"
                        description: No payload.
                required:
                    - type
        list_legsResult:
            name: list_legsResult
            title: List all active legs — success response
            payload:
                type: object
                properties:
                    type:
                        const: list_legs.result
                    request_id:
                        type: string
                    data:
                        type: array
                        items:
                            $ref: openapi.yaml#/components/schemas/LegView
                required:
                    - type
        get_leg:
            name: get_leg
            title: Get a single leg by id
            summary: Get a single leg by id
            payload:
                type: object
                properties:
                    type:
                        const: get_leg
                    request_id:
                        type: string
                        description: Echoed back on the matching .result/error frame; clients use it to correlate.
                    payload:
                        $ref: '#/components/schemas/idPayload'
                required:
                    - type
        get_legResult:
            name: get_legResult
            title: Get a single leg by id — success response
            payload:
                type: object
                properties:
                    type:
                        const: get_leg.result
                    request_id:
                        type: string
                    data:
                        $ref: openapi.yaml#/components/schemas/LegView
                required:
                    - type
        create_leg:
            name: create_leg
            title: Originate an outbound leg
            summary: Originate an outbound leg
            payload:
                type: object
                properties:
                    type:
                        const: create_leg
                    request_id:
                        type: string
                        description: Echoed back on the matching .result/error frame; clients use it to correlate.
                    payload:
                        $ref: openapi.yaml#/components/schemas/CreateLegRequest
                required:
                    - type
